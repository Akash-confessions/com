<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welkin Confessions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: transparent;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #bgVideo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.08);
            z-index: -1;
        }

        .header {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,.35);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .logo {
            color: #00bfff;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0,191,255,.7);
        }

        .settings-btn {
            font-size: 20px;
            cursor: pointer;
            color: white;
        }

        .dropdown-menu {
            position: absolute;
            top: 65px; right: 15px;
            width: 220px;
            background: rgba(0,0,0,.95);
            border-radius: 15px;
            display: none;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.08);
            z-index: 200;
        }

        .dropdown-menu.active { display: block; }

        .dropdown-menu a {
            display: block;
            padding: 14px;
            text-decoration: none;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,.05);
        }

        .dropdown-menu a:hover {
            background: rgba(0,191,255,.15);
            color: #00bfff;
        }

        .feed {
            max-width: 480px;
            margin: auto;
            padding: 16px 12px 100px;
        }

        /* Loading / empty state */
        .feed-status {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,.5);
            font-size: 14px;
        }

        .feed-status i {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
            opacity: .4;
        }

        .confession-card {
            background: transparent;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1.5px solid #00bfff;
            box-shadow: 0 0 10px rgba(0,191,255,.3), inset 0 0 12px rgba(0,191,255,.05);
            animation: fadeIn .4s ease;
        }

        @keyframes fadeIn {
            from { opacity:0; transform:translateY(10px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .confession-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00bfff;
            margin-bottom: 8px;
        }

        .confession-text {
            font-size: 13px;
            line-height: 1.7;
        }

        .admin-box {
            margin-top: 10px;
            padding: 10px 12px;
            background: rgba(0,191,255,.07);
            border-left: 3px solid #00bfff;
            border-radius: 10px;
        }

        .admin-title {
            color: #00bfff;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .time {
            margin-top: 8px;
            font-size: 11px;
            color: rgba(255,255,255,.55);
        }

        /* Comments */
        .comments-section {
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,.07);
            padding-top: 10px;
        }

        .comments-toggle {
            background: none;
            border: none;
            color: rgba(255,255,255,.5);
            font-size: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0;
            margin-bottom: 8px;
        }

        .comments-toggle:hover { color: #00bfff; }
        .comments-toggle i { font-size: 14px; }

        .comments-list {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .comments-list.open { display: flex; }

        .comments-list::-webkit-scrollbar { width: 4px; }
        .comments-list::-webkit-scrollbar-thumb {
            background: rgba(0,191,255,.3);
            border-radius: 10px;
        }

        .comment-item {
            background: rgba(255,255,255,.04);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            line-height: 1.5;
            border: 1px solid rgba(255,255,255,.05);
        }

        .comment-user {
            font-size: 10px;
            font-weight: 700;
            color: #00bfff;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }

        .comment-text { color: rgba(255,255,255,.8); }

        .comment-time {
            font-size: 10px;
            color: rgba(255,255,255,.35);
            margin-top: 4px;
        }

        .no-comments {
            font-size: 12px;
            color: rgba(255,255,255,.35);
            text-align: center;
            padding: 10px 0;
        }

        .comment-input-area {
            display: none;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .comment-input-area.open { display: flex; }

        .comment-input {
            flex: 1;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.09);
            border-radius: 50px;
            padding: 8px 14px;
            color: white;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border .2s;
        }

        .comment-input::placeholder { color: rgba(255,255,255,.3); }
        .comment-input:focus { border-color: rgba(0,191,255,.5); }

        .comment-send-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #00bfff;
            border: none;
            color: white;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .2s, transform .1s;
        }

        .comment-send-btn:hover { background: #009fd4; transform: scale(1.05); }
        .comment-send-btn:active { transform: scale(0.95); }

        .music-btn {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 55px; height: 55px;
            border: none;
            border-radius: 50%;
            background: #00bfff;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,191,255,.5);
            z-index: 999;
        }

        @media (max-width: 768px) {
            .logo { font-size: 13px; }
            .confession-card { padding: 12px 14px; }
            .confession-text { font-size: 13px; }
            .feed { max-width: 100%; padding: 12px 10px 100px; }
        }
    </style>
</head>
<body>

    <video id="bgVideo" autoplay muted loop playsinline>
        <source src="public-background.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="header">
        <div class="logo">WELKIN CONFESSIONS</div>
        <i class="fa-solid fa-gear settings-btn" id="settingsToggle"></i>
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="public-confessions.html"><i class="fa-solid fa-earth-americas"></i> Public Confessions</a>
            <a href="send-confession.html"><i class="fa-solid fa-paper-plane"></i> Send Confession</a>
            <a href="home.html"><i class="fa-solid fa-comments"></i> Anonymous Chat</a>
            <a href="feedback.html"><i class="fa-solid fa-headset"></i> Feedback &amp; Support</a>
        </div>
    </div>

    <!-- Feed container -->
    <div class="feed" id="confessionFeed">
        <div class="feed-status" id="feedStatus">
            <i class="fa-solid fa-spinner fa-spin"></i>
            Loading confessions…
        </div>
    </div>

    <button class="music-btn" onclick="toggleMusic()">🎵</button>
    <audio id="music" src="public-music.mp3" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            collection,
            query,
            where,
            orderBy,
            onSnapshot,
            addDoc,
            serverTimestamp,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyBFZYXN5MJ9WOMBXfCchUWnR9LEfOOzImw",
            authDomain:        "welkin-b3fee.firebaseapp.com",
            projectId:         "welkin-b3fee",
            storageBucket:     "welkin-b3fee.firebasestorage.app",
            messagingSenderId: "45894924521",
            appId:             "1:45894924521:web:ab81de1a168022ba1d9878"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        // ── REQUIRE VERIFIED IDENTITY ──
        if (!localStorage.getItem("welkinRollNumber") || !localStorage.getItem("welkinUsername")) {
            window.location.href = "index.html";
        }

        // Anonymous user ID
        let anonId = localStorage.getItem("welkin_anon_id");
        if (!anonId) {
            anonId = "Anon#" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem("welkin_anon_id", anonId);
        }

        function getTimeAgo(timestamp) {
            if (!timestamp) return "Just now";
            const diff = Math.floor((Date.now() - timestamp.toDate().getTime()) / 1000);
            if (diff < 60)     return `${diff}s ago`;
            if (diff < 3600)   return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400)  return `${Math.floor(diff/3600)}h ago`;
            if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
            return `${Math.floor(diff/604800)}w ago`;
        }

        function listenToComments(confessionId, commentsList) {
            const q = query(
                collection(db,"confessions",confessionId,"comments"),
                orderBy("timestamp","asc")
            );
            onSnapshot(q, snap => {
                commentsList.innerHTML = "";
                if (snap.empty) {
                    commentsList.innerHTML = `<div class="no-comments">No comments yet. Be the first!</div>`;
                    return;
                }
                snap.forEach(d => {
                    const c = d.data();
                    const item = document.createElement("div");
                    item.className = "comment-item";
                    item.innerHTML = `
                        <div class="comment-user">${c.user||"Anonymous"}</div>
                        <div class="comment-text">${escHtml(c.text||"")}</div>
                        <div class="comment-time">${getTimeAgo(c.timestamp)}</div>
                    `;
                    commentsList.appendChild(item);
                });
                commentsList.scrollTop = commentsList.scrollHeight;
            });
        }

        async function postComment(confessionId, input) {
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            input.disabled = true;
            try {
                await addDoc(collection(db,"confessions",confessionId,"comments"), {
                    text, user: anonId, timestamp: serverTimestamp()
                });
            } catch(err) {
                console.error("Comment failed:", err);
            }
            input.disabled = false;
            input.focus();
        }

        function escHtml(s) {
            return String(s||"").replace(/[&<>'"]/g, t =>
                ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[t]||t)
            );
        }

        function buildCard(docSnap) {
            const data = docSnap.data();
            const confessionId = docSnap.id;

            const card = document.createElement("div");
            card.className = "confession-card";
            card.dataset.id = confessionId;

            card.innerHTML = `
                <div class="confession-label">PUBLIC CONFESSION</div>
                <div class="confession-text">${escHtml(data.text||"")}</div>
                ${data.adminCaption ? `
                <div class="admin-box">
                    <div class="admin-title">ADMIN MESSAGE</div>
                    <div>${escHtml(data.adminCaption)}</div>
                </div>` : ""}
                <div class="time">${getTimeAgo(data.timestamp)}</div>
                <div class="comments-section">
                    <button class="comments-toggle">
                        <i class="fa-regular fa-comment"></i>
                        <span class="toggle-label">View Comments</span>
                    </button>
                    <div class="comments-list"></div>
                    <div class="comment-input-area">
                        <input class="comment-input" type="text" placeholder="Write anonymously..." maxlength="300"/>
                        <button class="comment-send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            `;

            const toggle      = card.querySelector(".comments-toggle");
            const toggleLabel = card.querySelector(".toggle-label");
            const commentsList= card.querySelector(".comments-list");
            const inputArea   = card.querySelector(".comment-input-area");
            const input       = card.querySelector(".comment-input");
            const sendBtn     = card.querySelector(".comment-send-btn");

            let loaded = false, open = false;

            toggle.addEventListener("click", () => {
                open = !open;
                if (open) {
                    commentsList.classList.add("open");
                    inputArea.classList.add("open");
                    toggleLabel.textContent = "Hide Comments";
                    toggle.querySelector("i").className = "fa-solid fa-comment";
                    if (!loaded) { listenToComments(confessionId, commentsList); loaded = true; }
                } else {
                    commentsList.classList.remove("open");
                    inputArea.classList.remove("open");
                    toggleLabel.textContent = "View Comments";
                    toggle.querySelector("i").className = "fa-regular fa-comment";
                }
            });

            sendBtn.addEventListener("click", () => postComment(confessionId, input));
            input.addEventListener("keydown", e => { if (e.key === "Enter") postComment(confessionId, input); });

            return card;
        }

        // ──────────────────────────────────────────────────────────────
        // LOAD APPROVED CONFESSIONS
        // We try the compound query (status == approved + orderBy timestamp).
        // If Firestore says "index required", we fall back to fetching all
        // confessions and filtering client-side so it always works even
        // before the index is created in Firebase console.
        // ──────────────────────────────────────────────────────────────
        const feed       = document.getElementById("confessionFeed");
        const feedStatus = document.getElementById("feedStatus");

        function renderFeed(docs) {
            // Remove old cards (keep status div until we know)
            feed.querySelectorAll(".confession-card").forEach(c => c.remove());

            const approved = docs.filter(d => d.data().status === "approved");

            if (approved.length === 0) {
                feedStatus.innerHTML = `<i class="fa-solid fa-scroll"></i>No approved confessions yet. Check back soon!`;
                feedStatus.style.display = "block";
                return;
            }

            feedStatus.style.display = "none";
            approved.forEach(d => feed.appendChild(buildCard(d)));
        }

        // Try compound query first
        try {
            const compoundQ = query(
                collection(db,"confessions"),
                where("status","==","approved"),
                orderBy("timestamp","desc")
            );

            onSnapshot(compoundQ, snap => {
                renderFeed(snap.docs);
            }, err => {
                console.warn("Compound query failed (index missing?), falling back:", err.message);

                // FALLBACK: listen to all confessions, filter client-side
                const fallbackQ = query(
                    collection(db,"confessions"),
                    orderBy("timestamp","desc")
                );

                onSnapshot(fallbackQ, snap => {
                    renderFeed(snap.docs);
                }, err2 => {
                    console.error("Fallback query also failed:", err2);
                    feedStatus.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i>Could not load confessions. Please try again later.`;
                });
            });

        } catch(e) {
            console.error(e);
            feedStatus.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i>Error loading confessions.`;
        }
    </script>

    <script>
        const settingsToggle = document.getElementById("settingsToggle");
        const dropdownMenu   = document.getElementById("dropdownMenu");

        settingsToggle.addEventListener("click", e => {
            e.stopPropagation();
            dropdownMenu.classList.toggle("active");
        });

        window.addEventListener("click", () => dropdownMenu.classList.remove("active"));

        function toggleMusic() {
            const music = document.getElementById("music");
            music.paused ? music.play() : music.pause();
        }
    </script>

</body>
</html>
